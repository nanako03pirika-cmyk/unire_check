name: UNIRE Daily Checker

on:
  schedule:
    - cron: '0 3,15 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 書き込み権限を与える（last_title.txtを保存するため）
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright
        python -m playwright install chromium

    - name: Run Scraper
      env:
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        TO_EMAIL: ${{ secrets.TO_EMAIL }}
      run: python unire_latest_check.py

    # --- 変更点：last_title.txt に変化があれば、自動的にGitHubに保存する ---
    - name: Commit and push if changed
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add last_title.txt
        git commit -m "Update last_title.txt with latest post" || echo "No changes to commit"
        git push
